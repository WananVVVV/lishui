worker_processes auto;

events {
  worker_connections 1024;
  accept_mutex on;
}

http {
  include mime.types;
  default_type application/octet-stream;
  client_max_body_size 10240M;
  proxy_connect_timeout 15s;
  proxy_read_timeout 300s;
  proxy_send_timeout 30s;
  index index.html;

  server {
    listen 80;
    server_name localhost;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    root /empower;

    # If this nginx also owns API routing, add more specific proxy locations for
    # /se/yyg-aqjc-api and /agent before the static history fallback below.
    location / {
      location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store";
      }

      location ~* \.json$ {
        default_type application/json;
      }

      alias /empower/city-safety-admin-front/;
      index index.html index.htm;
      # history模式路由增加try_files，hash模式路由删除try_files
      try_files $uri $uri/ /index.html;
    }

    location = /50x.html {
      root /empower/;
    }
  }
}
